[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "10ph-dvfl-midas"
version = "1.0.0"
description = "10PH-DVFL: MIDAS Dermatology Experiment"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = [
  "flwr[simulation]==1.26.1",
  "numpy",
  "torch",
  "torchvision",
  "scikit-learn",
  "pandas",
  "pillow",
]

[tool.hatch.build.targets.wheel]
packages = ["."]

[tool.flwr.app]
publisher = "Mahmoud2231991"

[tool.flwr.app.components]
# Replace with your experiment server and client scripts.
# Example: serverapp = "your_server_script:app"
serverapp = "YOUR_SERVER_SCRIPT:app"
clientapp = "YOUR_CLIENT_SCRIPT:app"

[tool.flwr.app.config]
# Hyperparameters for Flower-managed experiments (SplitNN and Decoupled VFL Tier 2)
# Note: Pre-training (BYOL/SUP) runs as standalone scripts before the Flower session
fold       = 1      # Change per fold (1-5)
rounds     = 100
batch_size = 64
seed       = 42
